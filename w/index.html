<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natasha Cano - Portafolio</title>
    <style>
        /* Estilos generales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3cb450;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;  
            width: 100%; 
            height: 100%;
            /* Reemplaza el link de abajo por el link de tu imagen */
            background-image: url('img/todo.jpeg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.9; /* Aquí controlas la transparencia (0.1 a 1) */
            z-index: -1;
        }

        /* Contenedor principal */
        .content {
            text-align: center;
            background: rgba(135, 135, 135, 0.7); /* Fondo blanco suave para el texto */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #222;
        }

        /* Estilo de los links */
        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link {
            text-decoration: none;
            color: #444;
            font-size: 1.2rem;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        
    </style>
</head>
<body>

    <div class="content">
        <h1>Natasha Cano</h1>
        
        <nav>
            <a href="obras.html" class="link">1- Obras</a>
            <a href="biografia.html" class="link">2- Biografía</a>
            <a href="contacto.html" class="link">3- Contacto</a>
        </nav>
    </div>

</body>
</html>
